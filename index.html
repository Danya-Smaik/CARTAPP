<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>ElectroHub</title>
</head>
<body>
        <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="brand">
                    <img src="images/logo.png" alt="ElectroHub" class="brand-logo">
                </a>
                <nav>
                 <ul id="link">
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Sign Up</a></li>
                 </ul>
                 <ul id="user_info">
                   <li><a href="#" id="user"></a></li>
                    <li class="shopping-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge"></span>
                        <div class="carts_products">
                            <div></div>
                            <a href="cartproducts.html">View All Products</a>
                        </div>
                    </li>
                    <li><a href="login.html" id="logout">Log Out</a></li>
                 </ul>
                </nav>
            </div>
        </div>
    </header>
    <section class="home">
        <div class="container">
            <div class="search_bar">
                <input type="text" id="search_input" placeholder="Search by product name...">
                <select id="category_filter">
                    <option value="all">All Categories</option>
                </select>
                <button id="search_btn">Search</button>
            </div>
            <div class="products">
            </div>
        </div>
    </section>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

<script src="js/common.js"></script>
<script src="js/products-data.js"></script>
<script src="js/script.js"></script>

</body>
</html>
